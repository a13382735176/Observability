apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: APP_LABEL-f12-net-corrupt
  namespace: vibe-coding
spec:
  action: corrupt
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: APP_LABEL
  corrupt:
    corrupt: "30"       # 30% packet bit-flip — TCP retransmits, garbled frames
    correlation: "25"
  duration: "120s"
