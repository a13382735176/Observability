apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: APP_LABEL-f14-mem-stress
  namespace: vibe-coding
spec:
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: APP_LABEL
  stressors:
    memory:
      workers: 1
      size: "200Mi"     # 40% of 512Mi limit — GC pressure / potential OOM kill
  duration: "120s"
