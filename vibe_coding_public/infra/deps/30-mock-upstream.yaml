# A tiny nginx that returns `{"ok": true, "path": "/whatever"}` on any URL.
# Used as the upstream target by payment-gateway / notification-dispatcher /
# rate-limiter-proxy / webhook-fanout. Chaos-mesh HTTPChaos replaces its
# response with 503 to simulate upstream failure.
apiVersion: v1
kind: ConfigMap
metadata: { name: mock-upstream-conf, namespace: vibe-coding }
data:
  nginx.conf: |
    worker_processes  1;
    error_log  /var/log/nginx/error.log notice;
    pid        /tmp/nginx.pid;
    events {
        worker_connections  1024;
    }
    http {
        proxy_temp_path       /tmp/proxy_temp;
        client_body_temp_path /tmp/client_temp;
        fastcgi_temp_path     /tmp/fastcgi_temp;
        uwsgi_temp_path       /tmp/uwsgi_temp;
        scgi_temp_path        /tmp/scgi_temp;
        include               /etc/nginx/mime.types;
        default_type          application/octet-stream;
        log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                          '$status $body_bytes_sent "$http_referer" '
                          '"$http_user_agent" "$http_x_forwarded_for"';
        access_log  /dev/stdout  main;
        sendfile        on;
        keepalive_timeout  65;
        include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    server {
      listen 8080 default_server;
      access_log /dev/stdout;
      error_log  /dev/stderr;
      location = /healthz {
        return 200 '{"ok": true}';
        add_header Content-Type application/json;
      }
      location / {
        return 200 '{"ok": true, "path": "$uri", "method": "$request_method"}';
        add_header Content-Type application/json;
      }
    }
---
apiVersion: v1
kind: Service
metadata: { name: mock-upstream, namespace: vibe-coding }
spec:
  selector: { app: mock-upstream }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: mock-upstream, namespace: vibe-coding }
spec:
  replicas: 1
  selector: { matchLabels: { app: mock-upstream } }
  template:
    metadata: { labels: { app: mock-upstream } }
    spec:
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          ports: [ { containerPort: 8080 } ]
          volumeMounts:
            - { name: conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf }
            - { name: conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: default.conf }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 2
            periodSeconds: 3
          resources:
            requests: { cpu: 25m, memory: 16Mi }
            limits:   { cpu: 200m, memory: 64Mi }
      volumes:
        - name: conf
          configMap: { name: mock-upstream-conf }
