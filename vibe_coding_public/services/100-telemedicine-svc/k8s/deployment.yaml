apiVersion: v1
kind: Service
metadata:
  name: telemedicine-svc
  namespace: vibe-coding
spec:
  selector:
    app: telemedicine-svc
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemedicine-svc
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemedicine-svc
  template:
    metadata:
      labels:
        app: telemedicine-svc
    spec:
      containers:
        - name: app
          image: vibe/100-telemedicine-svc:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: telemedicine-svc
            - name: REDIS_CACHE_HOST
              value: "redis-cache"
            - name: REDIS_STREAM_HOST
              value: "redis-stream"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
