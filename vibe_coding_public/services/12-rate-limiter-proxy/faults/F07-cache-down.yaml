apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: rate-limiter-proxy-f07-cache-down
  namespace: vibe-coding
spec:
  action: partition
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: rate-limiter-proxy        # only this service's pod — parallel-safe
  direction: both
  target:
    mode: all
    selector:
      namespaces: [vibe-coding]
      labelSelectors:
        app: redis-cache      # network-partition to redis-cache
  duration: "75s"
