apiVersion: v1
kind: Service
metadata:
  name: flight-search
  namespace: vibe-coding
spec:
  selector: { app: flight-search }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-search
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: flight-search } }
  template:
    metadata:
      labels: { app: flight-search }
    spec:
      containers:
        - name: app
          image: vibe/126-flight-search:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: flight-search }
            - { name: REDIS_CACHE_HOST, value: redis-cache }
            - { name: REDIS_CACHE_PORT, value: "6379" }
            - { name: UPSTREAM_URL, value: "http://mock-upstream:8080" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 3
            failureThreshold: 20
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
