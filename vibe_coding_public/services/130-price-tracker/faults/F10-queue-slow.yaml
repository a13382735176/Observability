apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: price-tracker-f10-queue-slow
  namespace: vibe-coding
spec:
  action: delay
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: price-tracker        # only this service's pod — parallel-safe
  direction: both
  target:
    mode: all
    selector:
      namespaces: [vibe-coding]
      labelSelectors:
        app: redis-stream  # delay traffic to/from redis-stream
  delay:
    latency: "3000ms"
    correlation: "0"
    jitter: "0ms"
  duration: "150s"
