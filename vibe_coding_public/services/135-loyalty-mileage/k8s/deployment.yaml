apiVersion: v1
kind: Service
metadata:
  name: loyalty-mileage
  namespace: vibe-coding
spec:
  selector: { app: loyalty-mileage }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty-mileage
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: loyalty-mileage } }
  template:
    metadata:
      labels: { app: loyalty-mileage }
    spec:
      containers:
        - name: app
          image: vibe/135-loyalty-mileage:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: loyalty-mileage }
            - { name: POSTGRES_HOST, value: postgres }
            - { name: POSTGRES_PORT, value: "5432" }
            - { name: REDIS_CACHE_HOST, value: redis-cache }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
