apiVersion: v1
kind: Service
metadata:
  name: queue-position
  namespace: vibe-coding
spec:
  selector:
    app: queue-position
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-position
  namespace: vibe-coding
  labels:
    app: queue-position
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-position
  template:
    metadata:
      labels:
        app: queue-position
    spec:
      containers:
        - name: app
          image: vibe/138-queue-position:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: queue-position
            - name: REDIS_HOST
              value: redis-cache
            - name: REDIS_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
