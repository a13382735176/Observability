apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: knowledge-base-svc-f06-db-slow
  namespace: vibe-coding
spec:
  action: delay
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: knowledge-base-svc        # only this service's pod — parallel-safe
  direction: both
  target:
    mode: all
    selector:
      namespaces: [vibe-coding]
      labelSelectors:
        app: postgres      # delay traffic to/from postgres
  delay:
    latency: "3000ms"
    correlation: "0"
    jitter: "0ms"
  duration: "150s"
