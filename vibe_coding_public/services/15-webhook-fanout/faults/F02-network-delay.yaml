apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: webhook-fanout-f02-network-delay
  namespace: vibe-coding
spec:
  action: delay
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: webhook-fanout
  delay:
    latency: "3000ms"
    correlation: "0"
    jitter: "0ms"
  duration: "150s"
  # NOTE: deliberately no `target.selector` — see faults/README.md gotcha #1
