apiVersion: v1
kind: Service
metadata:
  name: webhook-fanout
  namespace: vibe-coding
spec:
  selector: { app: webhook-fanout }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-fanout
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: webhook-fanout } }
  template:
    metadata:
      labels: { app: webhook-fanout }
    spec:
      containers:
        - name: app
          image: vibe/15-webhook-fanout:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: webhook-fanout }
            - { name: UPSTREAM_URL, value: "http://mock-upstream:8080" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
