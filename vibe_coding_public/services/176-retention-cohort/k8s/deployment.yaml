apiVersion: v1
kind: Service
metadata:
  name: retention-cohort
  namespace: vibe-coding
spec:
  selector: { app: retention-cohort }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retention-cohort
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: retention-cohort } }
  template:
    metadata:
      labels: { app: retention-cohort }
    spec:
      containers:
        - name: app
          image: vibe/176-retention-cohort:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: retention-cohort }
            - { name: POSTGRES_HOST, value: postgres }
            - { name: POSTGRES_PORT, value: "5432" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
