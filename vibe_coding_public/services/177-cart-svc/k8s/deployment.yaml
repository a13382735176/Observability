apiVersion: v1
kind: Service
metadata:
  name: cart-svc
  namespace: vibe-coding
spec:
  selector:
    app: cart-svc
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-svc
  namespace: vibe-coding
  labels:
    app: cart-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-svc
  template:
    metadata:
      labels:
        app: cart-svc
    spec:
      containers:
        - name: app
          image: vibe/177-cart-svc:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: cart-svc
            - name: PG_DSN
              value: "host=postgres port=5432 user=vibe password=vibe dbname=vibe"
            - name: REDIS_CACHE_HOST
              value: redis-cache
            - name: REDIS_CACHE_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
