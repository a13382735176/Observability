apiVersion: v1
kind: Service
metadata:
  name: thumbnail-generator
  namespace: vibe-coding
spec:
  selector:
    app: thumbnail-generator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thumbnail-generator
  namespace: vibe-coding
  labels:
    app: thumbnail-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thumbnail-generator
  template:
    metadata:
      labels:
        app: thumbnail-generator
    spec:
      containers:
        - name: app
          image: vibe/192-thumbnail-generator:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: thumbnail-generator
            - name: REDIS_CACHE_HOST
              value: redis-cache
            - name: REDIS_CACHE_PORT
              value: "6379"
            - name: UPSTREAM_URL
              value: "http://mock-upstream:8080"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
