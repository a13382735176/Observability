apiVersion: v1
kind: Service
metadata:
  name: shipping-calculator
  namespace: vibe-coding
spec:
  selector: { app: shipping-calculator }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-calculator
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: shipping-calculator } }
  template:
    metadata:
      labels: { app: shipping-calculator }
    spec:
      containers:
        - name: app
          image: vibe/24-shipping-calculator:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: shipping-calculator }
            - { name: PG_DSN, value: "postgres://vibe:vibe@postgres:5432/vibe" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
