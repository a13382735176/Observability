apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: loyalty-points-f05-db-down
  namespace: vibe-coding
spec:
  action: partition
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: loyalty-points        # only this service's pod — parallel-safe
  direction: both
  target:
    mode: all
    selector:
      namespaces: [vibe-coding]
      labelSelectors:
        app: postgres      # network-partition to postgres
  duration: "75s"
