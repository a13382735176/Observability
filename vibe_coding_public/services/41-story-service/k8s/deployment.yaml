apiVersion: v1
kind: Service
metadata:
  name: story-service
  namespace: vibe-coding
spec:
  selector: { app: story-service }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: story-service
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: story-service } }
  template:
    metadata:
      labels: { app: story-service }
    spec:
      containers:
        - name: app
          image: vibe/41-story-service:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: "story-service" }
            - { name: PG_DSN, value: "jdbc:postgresql://postgres:5432/vibe" }
            - { name: REDIS_CACHE_HOST, value: "redis-cache" }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
