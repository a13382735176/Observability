apiVersion: v1
kind: Service
metadata:
  name: firmware-updater
  namespace: vibe-coding
spec:
  selector: { app: firmware-updater }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: firmware-updater
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: firmware-updater } }
  template:
    metadata:
      labels: { app: firmware-updater }
    spec:
      containers:
        - name: app
          image: vibe/59-firmware-updater:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: "firmware-updater" }
            - { name: PG_DSN, value: "postgres://vibe:vibe@postgres:5432/vibe" }
            - { name: REDIS_CACHE_HOST, value: "redis-cache" }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
