apiVersion: v1
kind: Service
metadata:
  name: time-series-query
  namespace: vibe-coding
spec:
  selector:
    app: time-series-query
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: time-series-query
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: time-series-query
  template:
    metadata:
      labels:
        app: time-series-query
    spec:
      containers:
        - name: app
          image: vibe/61-time-series-query:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: time-series-query
            - name: PG_DSN
              value: "postgres://vibe:vibe@postgres:5432/vibe"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
