apiVersion: v1
kind: Service
metadata:
  name: batch-reader
  namespace: vibe-coding
spec:
  selector:
    app: batch-reader
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-reader
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: batch-reader
  template:
    metadata:
      labels:
        app: batch-reader
    spec:
      containers:
        - name: app
          image: vibe/62-batch-reader:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: batch-reader
            - name: REDIS_STREAM_HOST
              value: redis-stream
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
