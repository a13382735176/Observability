apiVersion: v1
kind: Service
metadata:
  name: health-monitor
  namespace: vibe-coding
spec:
  selector:
    app: health-monitor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: health-monitor
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: health-monitor
  template:
    metadata:
      labels:
        app: health-monitor
    spec:
      containers:
        - name: app
          image: vibe/65-health-monitor:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: health-monitor
            - name: PG_DSN
              value: "postgres://vibe:vibe@postgres:5432/vibe"
            - name: REDIS_CACHE_HOST
              value: redis-cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
