apiVersion: v1
kind: Service
metadata:
  name: config-push
  namespace: vibe-coding
spec:
  selector:
    app: config-push
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-push
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-push
  template:
    metadata:
      labels:
        app: config-push
    spec:
      containers:
        - name: app
          image: vibe/68-config-push:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: config-push
            - name: PG_DSN
              value: "Host=postgres;Port=5432;Username=vibe;Password=vibe;Database=vibe"
            - name: REDIS_CACHE_HOST
              value: redis-cache
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
