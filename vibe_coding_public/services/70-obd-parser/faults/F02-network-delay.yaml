apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: obd-parser-f02-network-delay
  namespace: vibe-coding
spec:
  action: delay
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: obd-parser
  delay:
    latency: "3000ms"
