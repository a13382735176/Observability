server.port=8080
spring.datasource.url=jdbc:postgresql://${PG_HOST:postgres}:${PG_PORT:5432}/${PG_DB:vibe}
spring.datasource.username=${PG_USER:vibe}
spring.datasource.password=${PG_PASS:vibe}
spring.datasource.hikari.connection-timeout=2000
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
