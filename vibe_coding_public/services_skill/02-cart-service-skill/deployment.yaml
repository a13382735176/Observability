apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service-skill
  namespace: vibe-coding
  labels:
    app: cart-service-skill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service-skill
  template:
    metadata:
      labels:
        app: cart-service-skill
    spec:
      containers:
        - name: cart-service-skill
          image: vibe/02-cart-service-skill:dev
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: "cart-service-skill"
            - name: REDIS_CACHE_URL
              value: "redis://redis-cache:6379/0"
            - name: REDIS_CACHE_HOST
              value: "redis-cache"
            - name: REDIS_CACHE_PORT
              value: "6379"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
