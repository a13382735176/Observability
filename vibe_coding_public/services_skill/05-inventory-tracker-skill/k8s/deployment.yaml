apiVersion: v1
kind: Service
metadata:
  name: inventory-tracker-skill
  namespace: vibe-coding
spec:
  selector: { app: inventory-tracker-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-tracker-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: inventory-tracker-skill } }
  template:
    metadata:
      labels: { app: inventory-tracker-skill }
    spec:
      containers:
        - name: app
          image: vibe/05-inventory-tracker-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: inventory-tracker-skill }
            - { name: REDIS_CACHE_URL, value: "redis://redis-cache:6379/0" }
            - { name: REDIS_CACHE_HOST, value: "redis-cache" }
            - { name: REDIS_CACHE_PORT, value: "6379" }
            - { name: REDIS_STREAM_URL, value: "redis://redis-stream:6379/0" }
            - { name: REDIS_STREAM_HOST, value: "redis-stream" }
            - { name: REDIS_STREAM_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
