apiVersion: v1
kind: Service
metadata:
  name: translation-svc-skill
  namespace: vibe-coding
spec:
  selector: { app: translation-svc-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translation-svc-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: translation-svc-skill } }
  template:
    metadata:
      labels: { app: translation-svc-skill }
    spec:
      containers:
        - name: app
          image: vibe/111-translation-svc-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: translation-svc-skill }
            - { name: UPSTREAM_URL, value: "http://mock-upstream:8080/healthz" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
