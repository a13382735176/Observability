apiVersion: v1
kind: Service
metadata:
  name: tenant-manager-skill
  namespace: vibe-coding
spec:
  selector: { app: tenant-manager-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-manager-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: tenant-manager-skill } }
  template:
    metadata:
      labels: { app: tenant-manager-skill }
    spec:
      containers:
        - name: app
          image: vibe/118-tenant-manager-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: "tenant-manager-skill" }
            - { name: PG_DSN_JDBC, value: "jdbc:postgresql://postgres:5432/vibe" }
            - { name: PG_USER, value: "vibe" }
            - { name: PG_PASS, value: "vibe" }
            - { name: REDIS_CACHE_HOST, value: "redis-cache" }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
