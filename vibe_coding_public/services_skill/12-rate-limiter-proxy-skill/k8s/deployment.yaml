apiVersion: v1
kind: Service
metadata:
  name: rate-limiter-proxy-skill
  namespace: vibe-coding
spec:
  selector: { app: rate-limiter-proxy-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rate-limiter-proxy-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: rate-limiter-proxy-skill } }
  template:
    metadata:
      labels: { app: rate-limiter-proxy-skill }
    spec:
      containers:
        - name: app
          image: vibe/12-rate-limiter-proxy-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: rate-limiter-proxy-skill }
            - { name: REDIS_CACHE_URL, value: "redis://redis-cache:6379/0" }
            - { name: REDIS_CACHE_HOST, value: "redis-cache" }
            - { name: REDIS_CACHE_PORT, value: "6379" }
            - { name: UPSTREAM_URL, value: "http://mock-upstream:8080" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
