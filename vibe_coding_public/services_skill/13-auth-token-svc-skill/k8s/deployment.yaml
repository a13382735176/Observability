apiVersion: v1
kind: Service
metadata:
  name: auth-token-svc-skill
  namespace: vibe-coding
spec:
  selector: { app: auth-token-svc-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-token-svc-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: auth-token-svc-skill } }
  template:
    metadata:
      labels: { app: auth-token-svc-skill }
    spec:
      containers:
        - name: app
          image: vibe/13-auth-token-svc-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: auth-token-svc-skill }
            - { name: PG_DSN, value: "postgres://vibe:vibe@postgres:5432/vibe" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 5
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
