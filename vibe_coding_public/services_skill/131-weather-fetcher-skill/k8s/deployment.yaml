apiVersion: v1
kind: Service
metadata:
  name: weather-fetcher-skill
  namespace: vibe-coding
spec:
  selector: { app: weather-fetcher-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-fetcher-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: weather-fetcher-skill } }
  template:
    metadata:
      labels: { app: weather-fetcher-skill }
    spec:
      containers:
        - name: app
          image: vibe/131-weather-fetcher-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: weather-fetcher-skill }
            - { name: REDIS_CACHE_HOST, value: redis-cache }
            - { name: REDIS_CACHE_PORT, value: "6379" }
            - { name: UPSTREAM_URL, value: "http://mock-upstream:8080" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
