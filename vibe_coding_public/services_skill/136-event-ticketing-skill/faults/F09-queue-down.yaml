apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: event-ticketing-skill-f09-queue-down
  namespace: vibe-coding
spec:
  action: partition
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: event-ticketing-skill        # only this service's pod — parallel-safe
  direction: both
  target:
    mode: all
    selector:
      namespaces: [vibe-coding]
      labelSelectors:
        app: redis-stream  # network-partition to redis-stream
  duration: "75s"
