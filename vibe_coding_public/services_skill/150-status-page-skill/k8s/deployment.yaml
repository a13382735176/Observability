apiVersion: v1
kind: Service
metadata:
  name: status-page-skill
  namespace: vibe-coding
spec:
  selector: { app: status-page-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-page-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: status-page-skill } }
  template:
    metadata:
      labels: { app: status-page-skill }
    spec:
      containers:
        - name: app
          image: vibe/150-status-page-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: status-page-skill }
            - { name: REDIS_CACHE_HOST, value: redis-cache }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 20
            periodSeconds: 3
            failureThreshold: 20
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
