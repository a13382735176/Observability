apiVersion: v1
kind: Service
metadata:
  name: refund-svc-skill
  namespace: vibe-coding
spec:
  selector: { app: refund-svc-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: refund-svc-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: refund-svc-skill } }
  template:
    metadata:
      labels: { app: refund-svc-skill }
    spec:
      containers:
        - name: app
          image: vibe/181-refund-svc-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: refund-svc-skill }
            - { name: POSTGRES_HOST, value: postgres }
            - { name: POSTGRES_PORT, value: "5432" }
            - { name: REDIS_STREAM_HOST, value: redis-stream }
            - { name: REDIS_STREAM_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
