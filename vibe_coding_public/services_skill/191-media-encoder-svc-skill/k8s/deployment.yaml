apiVersion: v1
kind: Service
metadata:
  name: media-encoder-svc-skill
  namespace: vibe-coding
spec:
  selector:
    app: media-encoder-svc-skill
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-encoder-svc-skill
  namespace: vibe-coding
  labels:
    app: media-encoder-svc-skill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: media-encoder-svc-skill
  template:
    metadata:
      labels:
        app: media-encoder-svc-skill
    spec:
      containers:
        - name: app
          image: vibe/191-media-encoder-svc-skill:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: media-encoder-svc-skill
            - name: PG_DSN
              value: postgres://vibe:vibe@postgres:5432/vibe
            - name: REDIS_STREAM_URL
              value: redis://redis-stream:6379
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
