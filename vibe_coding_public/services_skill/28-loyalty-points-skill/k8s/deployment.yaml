apiVersion: v1
kind: Service
metadata:
  name: loyalty-points-skill
  namespace: vibe-coding
spec:
  selector: { app: loyalty-points-skill }
  ports: [ { name: http, port: 8080, targetPort: 8080 } ]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loyalty-points-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector: { matchLabels: { app: loyalty-points-skill } }
  template:
    metadata:
      labels: { app: loyalty-points-skill }
    spec:
      containers:
        - name: app
          image: vibe/28-loyalty-points-skill:dev
          imagePullPolicy: Never
          ports: [ { containerPort: 8080 } ]
          env:
            - { name: APP_NAME, value: loyalty-points-skill }
            - { name: PG_DSN, value: "postgres://vibe:vibe@postgres:5432/vibe" }
            - { name: REDIS_CACHE_HOST, value: redis-cache }
            - { name: REDIS_CACHE_PORT, value: "6379" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 500m, memory: 512Mi }
