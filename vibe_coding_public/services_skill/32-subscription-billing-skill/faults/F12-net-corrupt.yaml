apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: subscription-billing-skill-f12-net-corrupt
  namespace: vibe-coding
spec:
  action: corrupt
  mode: all
  selector:
    namespaces: [vibe-coding]
    labelSelectors:
      app: subscription-billing-skill
  corrupt:
    corrupt: "30"       # 30% packet bit-flip → garbled frames / parse errors
    correlation: "25"
  duration: "120s"
