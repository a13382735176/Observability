apiVersion: v1
kind: Service
metadata:
  name: ledger-service-skill
  namespace: vibe-coding
spec:
  selector:
    app: ledger-service-skill
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service-skill
  namespace: vibe-coding
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ledger-service-skill
  template:
    metadata:
      labels:
        app: ledger-service-skill
    spec:
      containers:
        - name: app
          image: vibe/78-ledger-service-skill:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: APP_NAME
              value: ledger-service-skill
            - name: PG_DSN
              value: "postgres://vibe:vibe@postgres:5432/vibe"
            - name: PG_HOST
              value: postgres
            - name: PG_USER
              value: vibe
            - name: PG_PASS
              value: vibe
            - name: PG_DB
              value: vibe
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 3
            failureThreshold: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
